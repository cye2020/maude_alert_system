# ============================================
# Gold 파이프라인 분석 설정
# ============================================

# ──────────────────────────────────────────
# 분석 공통 설정
# ──────────────────────────────────────────

# 분석 윈도우 크기 (개월)
# - 각 window는 독립적인 Gold 테이블 생성 (CLUSTER_3M_DASHBOARD 등)
# - 3M  : 단기 급증 탐지 (계절성에 민감, 빠른 신호)
# - 6M  : 중기 추세
# - 9M  : 중장기 추세
# - 12M : 연간 베이스라인 비교 (가장 안정적, 표준)
# 권장: [3, 6, 9, 12] / 단순화 시: [6, 12]
windows: [3, 6, 9, 12]

source_table: EVENT_CLUSTERED


# ──────────────────────────────────────────
# Spike Detection 파라미터
# ──────────────────────────────────────────
spike_detection:

  # 탐지 대상 컬럼
  keyword_column: DEFECT_TYPE
  date_column: DATE_RECEIVED
  count_column: MDR_REPORT_KEY

  # 탐지 제외 조건 (너무 광범위한 분류는 의미있는 스파이크 탐지 불가)
  filters: "DEFECT_TYPE NOT IN ('Unknown', 'Other')"

  # Z-score 분모 안정화 상수 (신규 결함 유형의 log_base_std=0 방지)
  # - 신규 키워드는 기저 기간 데이터 없음 → base_std=0 → Z-score 폭발
  # - eps를 분모에 더해 수치 안정성 확보 (값이 클수록 보수적)
  # - 0.01 : 거의 보정 없음 (민감)
  # - 0.1  : 표준 (권장)
  # - 0.5  : 강한 보정 (신규 항목 탐지 억제)
  eps: 0.1

  # Z-score 임계값
  # - Z-score = (최근 건수 - 베이스라인 평균) / 베이스라인 표준편차
  # - 높을수록 보수적 (적게 탐지), 낮을수록 민감 (많이 탐지)
  # - 1.5 : 민감 (초기 탐지용, 위양성 많음)
  # - 2.0 : 표준 (95% 신뢰구간, 권장)
  # - 2.5 : 보수적 (오탐 최소화)
  z_threshold: 2.0

  # 최소 보고 건수 기준
  # - 최근 window 내 이 값 미만인 결함 유형은 탐지 제외
  # - 너무 낮으면 소규모 데이터의 통계적 노이즈가 스파이크로 잡힘
  # - 10 : 희귀 결함도 포함 (민감)
  # - 20 : 표준 (권장)
  # - 50 : 충분한 데이터가 있는 항목만 (보수적)
  min_c_recent: 20

  # 유의수준 (Poisson 검정)
  # - 낮을수록 엄격한 기준 → 확실한 것만 탐지
  # - 0.01 : 엄격 (위양성 최소화)
  # - 0.05 : 표준 (권장)
  # - 0.10 : 느슨 (탐지 수 증가)
  alpha: 0.05

  # 다중검정 보정 방법 (여러 결함 유형을 동시에 검정할 때 위양성 통제)
  # - fdr_bh   : Benjamini-Hochberg, FDR(False Discovery Rate) 통제
  #              적당한 민감도 유지, 의료 분야 표준 (권장)
  # - bonferroni: 더 엄격, 위양성 최소화 대신 탐지 수 크게 감소
  correction: fdr_bh


# ──────────────────────────────────────────
# Statistical Analysis 파라미터
# ──────────────────────────────────────────
statistical_analysis:

  # 카이제곱 검정 행/열 기준 컬럼
  # - row_column × col_column 의 분할표(contingency table)를 만들어 독립성 검정
  row_column: PRODUCT_CODE
  col_column: DEFECT_TYPE

  # 탐지 제외 조건
  filters: "DEFECT_TYPE NOT IN ('Unknown', 'Other')"

  # 카이제곱 최소 셀 기대빈도
  # - 기대빈도가 이 값 미만인 셀이 있는 조합은 검정 제외
  # - 카이제곱 검정 가정: 기대빈도 >= 5 (엄격) / >= 1 (느슨)
  # - 1 : 거의 모든 조합 분석 (결과 신뢰도 낮을 수 있음)
  # - 3 : 균형잡힌 타협점 (권장)
  # - 5 : 통계적으로 가장 신뢰할 수 있는 조합만
  min_cell: 3

  # 유의수준 (카이제곱 / Odds Ratio 검정)
  # - 0.01 : 엄격 (확실한 연관성만)
  # - 0.05 : 표준 (권장)
  # - 0.10 : 느슨 (약한 연관성도 포함)
  alpha: 0.05
